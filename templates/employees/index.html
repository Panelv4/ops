{% extends "layout/base.html" %}

{% block content %}

<h1>👥 Employees</h1>

<!-- STATS -->
<div class="card" id="statsBox">
    Loading stats...
</div>

<!-- ACTION BAR -->
<div class="card">
    <button onclick="showAddModal()">➕ Add Employee</button>
    <input id="search" placeholder="Search..." onkeyup="loadEmployees()" />
</div>

<!-- TABLE -->
<div class="card">
<table width="100%" border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Dept</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="empTable"></tbody>
</table>
</div>

<!-- ADD/EDIT MODAL -->
<div id="modal" style="display:none; position:fixed; top:20%; left:30%; background:white; padding:20px; border:1px solid #ccc;">
    <h3 id="modalTitle">Add Employee</h3>

    <input id="emp_id" type="hidden">

    <input id="name" placeholder="Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input id="dept" placeholder="Department"><br><br>
    <input id="status" placeholder="Status (Active/Inactive)"><br><br>

    <button onclick="saveEmployee()">Save</button>
    <button onclick="closeModal()">Close</button>
</div>

<script src="/static/js/employees.js"></script>

{% endblock %}

{% extends "layout/base.html" %}

{% block content %}

<h1>🕒 Attendance</h1>

<div style="display:flex; gap:10px;">

    <!-- LEFT SIDE -->
    <div style="flex:2;">
        <div class="card" id="attendanceStats">Loading...</div>
        <div class="card">
            <table width="100%">
                <tbody id="attendanceTable"></tbody>
            </table>
        </div>
    </div>

    <!-- RIGHT SIDE (SMALL PIE CHART AREA) -->
    <div style="flex:1;">
        <div class="card" style="height:250px;">
            <canvas id="attendancePie"></canvas>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/attendance.js"></script>

{% endblock %}
